{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %} {{ chatroom.name }} {% endblock%}

{% block content %} 
<h1>You a now in {{ chatroom.name }}</h1>

<div class="d-flex align-items-center">
  <h3>Users : </h3>
  <ul id="userlist" class="list-group list-group-flush"></ul>
</div>

<div id="chat" class="container justify-content-center" style="height:600px; overflow-y: auto;"></div>

<div class="d-flex input-group p-4">
  <input id="chat-message-input" type="text" class="form-control mx-3"><br>
  <input id="chat-message-submit" type="button" value="send" class="btn btn-primary"><br>
</div>
<script>

const roomid = {{ chatroom.id }};

const ws = new WebSocket(
  "ws://"
  + window.location.host
  + "/ws/chat/"
  + roomid
  + "/"
);

const chat = document.querySelector("#chat"); 
const userList = document.querySelector("#userlist"); 
const messageInput = document.querySelector("#chat-message-input"); 
const messageSubmit = document.querySelector("#chat-message-submit"); 

//WS
ws.onopen = (e) => {
  ws.send(JSON.stringify({
    "type": "message",
    "message": "<Joined the chat>",
  }));
}

ws.onmessage = (e) => {
  const data = JSON.parse(e.data);
  console.log(data)
  if (data.type == "chat_message") {
    chat.appendChild(createMessage(data.username, data.message, data.timestamp));
    chat.scrollTo({
      top: chat.scrollHeight
    })
  }
  if (data.type == "userlist") {
    refreshUserList(data.users);
  }
};

ws.onclose = (e) => {
  console.log("Socket closed");
};

//UI
messageInput.focus();

messageInput.onkeyup = (e) => {
  if (e.key === "Enter" ) {
    messageSubmit.click();
  }
};

messageSubmit.onclick = (e) => {
  ws.send(JSON.stringify({
    "type": "message",
    "message": messageInput.value,
  }));
};

//Utils
function createMessage(author, content, timestamp) {
  const div = document.createElement("div");
  div.className = "card m-3";

  const header = document.createElement("div");
  header.className = "card-header";

  const messageAuthor = document.createElement("strong");
  messageAuthor.textContent = author;

  const messageTime = document.createElement("small");
  messageTime.textContent = "  " + timestamp;

  header.appendChild(messageAuthor);
  header.appendChild(messageTime);

  const body = document.createElement("div");
  body.className = "card-body";
  body.textContent = content;

  div.appendChild(header);
  div.appendChild(body);

  return div;
}

function refreshUserList(userlist) {
  userList.replaceChildren();

  userlist.forEach(u => {
    const li = document.createElement("li");
    li.textContent = u;
    li.className = "list-group-item text-center";
    userList.appendChild(li);
  });
}

</script>

{% endblock %}
